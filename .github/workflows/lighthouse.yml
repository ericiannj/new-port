name: Lighthouse CI

on:
  deployment_status:

jobs:
  audit:
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path: ['/', '/about', '/projects']
        preset: ['mobile', 'desktop']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install -g lighthouse

      - name: Derive safe path name
        id: name
        run: |
          raw="${{ matrix.path }}"
          stripped="${raw#/}"
          echo "value=${stripped:-home}" >> "$GITHUB_OUTPUT"

      - name: Run Lighthouse
        run: |
          set -e
          URL="${{ github.event.deployment_status.target_url }}${{ matrix.path }}"
          OUT="./lighthouse-${{ matrix.preset }}-${{ steps.name.outputs.value }}"
          if [ "${{ matrix.preset }}" = "mobile" ]; then
            lighthouse "$URL" \
              --form-factor=mobile \
              --output=json --output=html \
              --output-path="$OUT" \
              --chrome-flags="--headless --no-sandbox"
          else
            lighthouse "$URL" \
              --preset=desktop \
              --output=json --output=html \
              --output-path="$OUT" \
              --chrome-flags="--headless --no-sandbox"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ matrix.preset }}-${{ steps.name.outputs.value }}
          path: |
            lighthouse-${{ matrix.preset }}-${{ steps.name.outputs.value }}.report.html
            lighthouse-${{ matrix.preset }}-${{ steps.name.outputs.value }}.report.json
          retention-days: 90

  notify:
    needs: audit
    # Run even if some matrix jobs failed, but skip when `audit` was skipped
    # (non-production deploys or failed deploys).
    if: ${{ !cancelled() && needs.audit.result != 'skipped' }}
    runs-on: ubuntu-latest
    steps:
      # Checkout the deployed revision so we can read the real commit subject (deployment.description is often empty for Vercel).
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}
          fetch-depth: 1

      - name: Commit metadata for email
        id: deploy_commit
        run: |
          echo "sha=${{ github.event.deployment.sha }}" >> "$GITHUB_OUTPUT"
          echo "message<<LIGHTHOUSE_COMMIT_MSG_EOF" >> "$GITHUB_OUTPUT"
          git log -1 --pretty=%s >> "$GITHUB_OUTPUT"
          echo "LIGHTHOUSE_COMMIT_MSG_EOF" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          pattern: lighthouse-*
          path: ./reports
          merge-multiple: true

      - name: Send summary email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          COMMIT_SHA: ${{ steps.deploy_commit.outputs.sha }}
          COMMIT_MESSAGE: ${{ steps.deploy_commit.outputs.message }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_URL: https://github.com/${{ github.repository }}/commit/${{ steps.deploy_commit.outputs.sha }}
        run: node scripts/lighthouse-report.mjs
